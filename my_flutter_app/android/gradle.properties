org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation fails on Windows when the Flutter project is on one drive (e.g. E:\)
# and pub packages compile from another (C:\Users\...\Pub\Cache\...) — different roots break
# RelocatableFileToPathConverter. Disabling incremental avoids that path bug (slightly slower Kotlin builds).
kotlin.incremental=false
